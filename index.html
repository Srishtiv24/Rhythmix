<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rhythmix - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="content">
     <nav>
        <ul>
          
            <li class="brand"><img src="music-note-icon-34250.png" alt="logo" style="height: 2rem;width:2rem;">Rhythmix</li>     
            <li>Home</li>
            <li>About</li>
        </ul>
     </nav>
     <div class="container">
        <h2>Best of NCS - No Copyright Sounds</h2>

        <div class="song-list">

            <div class="song-item">
                <img src="covers\ncs.jpg">
                <span class="songName"></span>
                <span class="song-list-play">
                    <span class="time-stamp"> </span>
                    <i class="fa-solid fa-play indv-play"></i>


                </span>
            </div>
            <div class="song-item">
                <img src="covers\ncs.jpg">
                <span class="songName"></span>
                <span class="song-list-play">
                    <span class="time-stamp"></span>

                        <i class="fa-solid fa-play indv-play"></i>


                </span>
            </div>
            <div class="song-item">
                <img src="covers\ncs.jpg">
                <span class="songName"></span>
                <span class="song-list-play">
                    <span class="time-stamp"> </span>
                    <i class="fa-solid fa-play indv-play"></i>


                </span>
            </div>
            <div class="song-item">
                <img src="covers\ncs.jpg">
                <span class="songName"></span>
                <span class="song-list-play">
                    <span class="time-stamp"> </span>
                    <i class="fa-solid fa-play indv-play"></i>
                </span>
            </div>
            <div class="song-item">
                <img src="covers\ncs.jpg">
                <span class="songName"> </span>
                <span class="song-list-play">
                    <span class="time-stamp">  </span>
                    <i class="fa-solid fa-play indv-play"></i>
                </span>
            </div>
            <div class="song-item">
                <img src="covers\ncs.jpg">
                <span class="songName"></span>
                <span class="song-list-play">
                    <span class="time-stamp">  </span>
                    <i class="fa-solid fa-play indv-play"></i>


                </span>
            </div>
        </div>

       
     </div>

     <div class="bottom">
        <input type="range" name="range" value="0" max="100" id="progressBar">
        
           
        <div class="icons">
            <!--icons of font awesome-->
            <i class="fa-solid fa-step-backward"></i>
            <i class="fa-solid fa-circle-play" id="masterPlay"></i>
            <i class="fa-solid fa-step-forward"></i>

        </div>
         <span class="song-info">
                <img src="White Lines Illustration Sticker.gif " id="gif" alt="gif"><span id="currSong"></span>
            </span>
     </div>
    </div>
     <script src="app.js"></script>
</body>
</html>
